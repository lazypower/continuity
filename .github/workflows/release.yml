name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build UI
        run: |
          cd ui && npm ci && npm run build && cd ..
          cp -r ui/dist cmd/continuity/ui

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-X github.com/lazypower/continuity/internal/cli.Version=${VERSION}"
          LDFLAGS="${LDFLAGS} -X github.com/lazypower/continuity/internal/cli.Commit=${COMMIT}"
          LDFLAGS="${LDFLAGS} -X github.com/lazypower/continuity/internal/cli.BuildDate=${DATE}"

          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi

          go build -ldflags "${LDFLAGS}" -o "continuity-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" ./cmd/continuity

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: continuity-${{ matrix.goos }}-${{ matrix.goarch }}
          path: continuity-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/continuity-*

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping Homebrew update"
            exit 0
          fi

          VERSION=${GITHUB_REF_NAME#v}

          # Download release artifacts and compute checksums
          gh release download "v${VERSION}" --repo lazypower/continuity -p "continuity-darwin-arm64" -D /tmp
          SHA_DARWIN_ARM64=$(sha256sum /tmp/continuity-darwin-arm64 | cut -d' ' -f1)
          gh release download "v${VERSION}" --repo lazypower/continuity -p "continuity-darwin-amd64" -D /tmp
          SHA_DARWIN_AMD64=$(sha256sum /tmp/continuity-darwin-amd64 | cut -d' ' -f1)
          gh release download "v${VERSION}" --repo lazypower/continuity -p "continuity-linux-amd64" -D /tmp
          SHA_LINUX_AMD64=$(sha256sum /tmp/continuity-linux-amd64 | cut -d' ' -f1)
          gh release download "v${VERSION}" --repo lazypower/continuity -p "continuity-linux-arm64" -D /tmp
          SHA_LINUX_ARM64=$(sha256sum /tmp/continuity-linux-arm64 | cut -d' ' -f1)

          # Generate the formula
          cat > /tmp/continuity.rb <<FORMULA
          class Continuity < Formula
            desc "Persistent memory for AI coding agents"
            homepage "https://github.com/lazypower/continuity"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/lazypower/continuity/releases/download/v#{version}/continuity-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"

                def install
                  bin.install "continuity-darwin-arm64" => "continuity"
                end
              end

              on_intel do
                url "https://github.com/lazypower/continuity/releases/download/v#{version}/continuity-darwin-amd64"
                sha256 "${SHA_DARWIN_AMD64}"

                def install
                  bin.install "continuity-darwin-amd64" => "continuity"
                end
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/lazypower/continuity/releases/download/v#{version}/continuity-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"

                def install
                  bin.install "continuity-linux-arm64" => "continuity"
                end
              end

              on_intel do
                url "https://github.com/lazypower/continuity/releases/download/v#{version}/continuity-linux-amd64"
                sha256 "${SHA_LINUX_AMD64}"

                def install
                  bin.install "continuity-linux-amd64" => "continuity"
                end
              end
            end

            test do
              assert_match "continuity", shell_output("#{bin}/continuity version")
            end
          end
          FORMULA

          # Strip leading whitespace from heredoc indentation
          sed -i 's/^          //' /tmp/continuity.rb

          # Clone tap, update formula, push
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/lazypower/homebrew-tap.git" /tmp/tap
          cp /tmp/continuity.rb /tmp/tap/Formula/continuity.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/continuity.rb
          git commit -m "continuity ${VERSION}"
          git push
